{% extends "base.html" %}
{% block title %}Candidates{% endblock %}

{% block content %}
<div class="section-header">
    <h2>All Candidates</h2>
</div>

<div style="margin-bottom:1rem;display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center">
    <input type="text" id="candidate-search" placeholder="Search by name..."
           style="padding:0.5rem 0.75rem;border:1px solid var(--gray-400);border-radius:var(--radius);font-size:0.9rem;width:250px" />
    <span class="subtitle" style="margin-left:0.5rem">Filter:</span>
    <button onclick="filterByJurisdiction(null)" class="badge badge-city" style="cursor:pointer;border:none;font-size:0.8rem;padding:0.3rem 0.7rem">All</button>
    {% for j in jurisdictions %}
    <button onclick="filterByJurisdiction({{ j.id }})" class="badge badge-{{ j.jurisdiction_type }}" style="cursor:pointer;border:none;font-size:0.8rem;padding:0.3rem 0.7rem">{{ j.name }}</button>
    {% endfor %}
</div>

<div id="candidate-results">
    <p class="subtitle">Loading candidates...</p>
</div>
{% endblock %}
